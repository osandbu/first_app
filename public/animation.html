<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The AI-Native Executive</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
canvas { display: block; }
#overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.93);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: Georgia, serif; cursor: pointer; z-index: 10; user-select: none;
}
#overlay h1 { font-size: 2.5rem; color: #c9a84c; letter-spacing: .1em; margin-bottom: .3em; }
#overlay p  { color: #555; font-size: .95rem; letter-spacing: .05em; }
.play { margin-top: 2.5rem; width: 72px; height: 72px; border: 2.5px solid #c9a84c;
  border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.play::after { content:''; border-left: 26px solid #c9a84c;
  border-top: 15px solid transparent; border-bottom: 15px solid transparent; margin-left: 6px; }
</style>
</head>
<body>
<div id="overlay">
  <h1>THE AI-NATIVE EXECUTIVE</h1>
  <p>A 90-second animated explainer · Click to play with narration</p>
  <div class="play"></div>
</div>
<canvas id="c"></canvas>
<script>
'use strict';
// ── CANVAS SETUP ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 1280, H = 720;
canvas.width = W; canvas.height = H;
function resize() {
  const s = Math.min(window.innerWidth/W, window.innerHeight/H);
  canvas.style.width = W*s+'px'; canvas.style.height = H*s+'px';
}
window.addEventListener('resize', resize); resize();

// ── MATH ─────────────────────────────────────────────────────
const PI = Math.PI;
const clamp   = (x,lo=0,hi=1) => Math.max(lo,Math.min(hi,x));
const lerp    = (a,b,t) => a+(b-a)*clamp(t);
const easeOut = x => 1-Math.pow(1-clamp(x),3);
const easeIn  = x => Math.pow(clamp(x),3);
const eIO     = x => { x=clamp(x); return x<.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2; }
let T = 0;
const fi = (s,d=1) => easeOut(clamp((T-s)/d));
const scA = (s,e,i=1,o=1) =>
  Math.min(easeOut(clamp((T-s)/i)), 1-easeOut(clamp((T-(e-o))/o)));

// walk cycle – returns arm/leg angles + bob
function wc(speed=3.5) {
  const p = T*speed;
  return { lL:Math.sin(p)*.42, lR:Math.sin(p+PI)*.42,
           aL:-Math.sin(p)*.28, aR:-Math.sin(p+PI)*.28,
           bob:Math.abs(Math.sin(p))*4 };
}
function idle() {
  return { lL:0, lR:0, aL:.18, aR:-.18, bob:Math.sin(T*1.8)*2.5 };
}

// ── COLORS ───────────────────────────────────────────────────
const C = {
  bg:'#07070e', gold:'#c9a84c', goldD:'#7a6328',
  blue:'#4a9eff', white:'#efefef', gray:'#778899',
  red:'#d95555', green:'#52b080', skin:'#e8a878',
  navy:'#1a3060', darkW:'#2c1505', midW:'#5c3018',
};

// ── DRAW HELPERS ─────────────────────────────────────────────
function setA(a){ ctx.globalAlpha = clamp(a); }
function txt(s,x,y,sz,col,a=1,al='center',f='Georgia,serif'){
  if(a<=0)return; ctx.save(); setA(a);
  ctx.fillStyle=col; ctx.font=sz+'px '+f;
  ctx.textAlign=al; ctx.textBaseline='middle';
  ctx.fillText(s,x,y); ctx.restore();
}
function bold(s,x,y,sz,col,a=1,al='center'){txt(s,x,y,sz,col,a,al,'bold Georgia,serif');}
function sans(s,x,y,sz,col,a=1,al='center'){txt(s,x,y,sz,col,a,al,'Arial,sans-serif');}
function mono(s,x,y,sz,col,a=1,al='center'){txt(s,x,y,sz,col,a,al,'"Courier New",monospace');}
function circ(x,y,r,col,a=1){
  if(a<=0||r<=0)return; ctx.save(); setA(a);
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y,r,0,PI*2); ctx.fill(); ctx.restore();
}
function ln(x1,y1,x2,y2,col,lw=2,a=1,dash=[]){
  if(a<=0)return; ctx.save(); setA(a);
  ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.lineCap='round';
  ctx.setLineDash(dash); ctx.beginPath(); ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2); ctx.stroke(); ctx.restore();
}
function fr(x,y,w,h,col,a=1){ if(a<=0)return; ctx.save(); setA(a); ctx.fillStyle=col; ctx.fillRect(x,y,w,h); ctx.restore(); }

// paper icon
function paper(x,y,w,h,ang=0,a=1){
  if(a<=0)return; ctx.save(); setA(a);
  ctx.translate(x,y); ctx.rotate(ang);
  ctx.fillStyle='#f5f0e5'; ctx.fillRect(-w/2,-h/2,w,h);
  ctx.fillStyle='#d0c8b5';
  for(let i=0;i<4;i++) ctx.fillRect(-w/2+w*.12,-h*.28+i*(h/5),w*.76,h*.055);
  ctx.restore();
}

// AI orb
function orb(x,y,r,a=1){
  if(a<=0)return; ctx.save(); setA(a);
  let g=ctx.createRadialGradient(x,y,0,x,y,r*3.2);
  g.addColorStop(0,C.blue+'88'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r*3.2,0,PI*2); ctx.fill();
  let c=ctx.createRadialGradient(x,y,0,x,y,r);
  c.addColorStop(0,'#fff'); c.addColorStop(.3,C.blue); c.addColorStop(1,'#041830');
  ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,y,r,0,PI*2); ctx.fill();
  ctx.strokeStyle=C.blue+'77'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(x,y,r*1.9,r*.55,T*1.1,0,PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(x,y,r*1.9,r*.55,T*1.1+PI/2,0,PI*2); ctx.stroke();
  ctx.restore();
}

// ── CHARACTER ─────────────────────────────────────────────────
// x,y = foot position; sz = head radius
function char(x,footY,sz,{
  mood='neutral', suit=C.navy, tie=C.gold,
  facing=1, aL=.15, aR=-.15, lL=0, lR=0,
  bob=0, a=1, noTie=false,
}={}){
  if(a<=0)return;
  ctx.save(); ctx.globalAlpha *= clamp(a);
  const fy=footY-bob;
  const headY=fy-sz*6.0, bodyY=fy-sz*3.8, hipY=fy-sz*1.85;
  const shY=bodyY-sz*.95, shX=sz*.9;
  const legW=sz*.46, armW=sz*.42;

  // ── LEGS ──
  function drawLeg(side, ang){
    ctx.save();
    ctx.translate(x+side*sz*.32*facing, hipY);
    ctx.rotate(ang*facing);
    ctx.fillStyle='#111827';
    ctx.beginPath(); ctx.roundRect(-legW/2,0,legW,sz*1.88,legW/2); ctx.fill();
    ctx.fillStyle='#08080f';
    ctx.beginPath(); ctx.ellipse(facing*sz*.2,sz*1.88,sz*.34,sz*.14,0,0,PI*2); ctx.fill();
    ctx.restore();
  }
  drawLeg( 1,lR); drawLeg(-1,lL);

  // ── BODY ──
  ctx.fillStyle=suit;
  ctx.beginPath(); ctx.ellipse(x,bodyY,sz*.97,sz*1.3,0,0,PI*2); ctx.fill();
  // shirt V
  ctx.fillStyle='#f0f0f0';
  ctx.beginPath();
  ctx.moveTo(x-sz*.24,bodyY-sz*.86); ctx.lineTo(x+sz*.24,bodyY-sz*.86);
  ctx.lineTo(x+sz*.07,bodyY+sz*.2); ctx.lineTo(x,bodyY+sz*.36);
  ctx.lineTo(x-sz*.07,bodyY+sz*.2); ctx.closePath(); ctx.fill();
  // tie
  if(!noTie){
    ctx.fillStyle=tie;
    ctx.beginPath();
    ctx.moveTo(x-sz*.1,bodyY-sz*.6); ctx.lineTo(x+sz*.1,bodyY-sz*.6);
    ctx.lineTo(x+sz*.065,bodyY+sz*.05); ctx.lineTo(x,bodyY+sz*.35);
    ctx.lineTo(x-sz*.065,bodyY+sz*.05); ctx.closePath(); ctx.fill();
  }

  // ── ARMS ──
  function drawArm(side, ang){
    ctx.save();
    ctx.translate(x+side*shX*facing, shY);
    ctx.rotate(ang*facing);
    ctx.fillStyle=suit;
    ctx.beginPath(); ctx.roundRect(-armW/2,0,armW,sz*1.42,armW/2); ctx.fill();
    ctx.fillStyle=C.skin;
    ctx.beginPath(); ctx.arc(0,sz*1.42,sz*.23,0,PI*2); ctx.fill();
    ctx.restore();
  }
  drawArm( 1,aR); drawArm(-1,aL);

  // ── HEAD ──
  ctx.fillStyle=C.skin;
  ctx.beginPath(); ctx.roundRect(x-sz*.2,headY+sz*.78,sz*.4,sz*.28,sz*.08); ctx.fill();
  ctx.beginPath(); ctx.arc(x,headY,sz,0,PI*2); ctx.fill();
  // hair
  ctx.fillStyle='#2e1a08';
  ctx.beginPath(); ctx.arc(x,headY,sz,PI*.92,PI*.08); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.arc(x+sz*.93*facing,headY+sz*.18,sz*.22,PI*.3,PI*1.3); ctx.fill();

  // ── FACE ──
  const eY=headY+sz*.1, mY=headY+sz*.52;
  const eL=x-sz*.37, eR=x+sz*.37;

  // whites
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(eL,eY,sz*.2,sz*.17,0,0,PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(eR,eY,sz*.2,sz*.17,0,0,PI*2); ctx.fill();

  if(mood==='amazed'){
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(eL,eY,sz*.15,0,PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eR,eY,sz*.15,0,PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(eL-sz*.04,eY-sz*.05,sz*.05,0,PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eR-sz*.04,eY-sz*.05,sz*.05,0,PI*2); ctx.fill();
    ctx.strokeStyle='#422'; ctx.lineWidth=sz*.08; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(x,mY+sz*.05,sz*.22,0,PI*2); ctx.stroke();
    ctx.strokeStyle='#2e1a08'; ctx.lineWidth=sz*.09;
    ctx.beginPath(); ctx.moveTo(eL-sz*.2,eY-sz*.34); ctx.lineTo(eL+sz*.2,eY-sz*.42); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eR-sz*.2,eY-sz*.42); ctx.lineTo(eR+sz*.2,eY-sz*.34); ctx.stroke();
  } else if(mood==='worried'){
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(eL+sz*.03,eY+sz*.02,sz*.13,0,PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eR-sz*.03,eY+sz*.02,sz*.13,0,PI*2); ctx.fill();
    ctx.strokeStyle='#422'; ctx.lineWidth=sz*.08; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(x,mY+sz*.14,sz*.29,PI+.35,-.35); ctx.stroke();
    ctx.strokeStyle='#2e1a08'; ctx.lineWidth=sz*.09;
    ctx.beginPath(); ctx.moveTo(eL-sz*.2,eY-sz*.34); ctx.lineTo(eL+sz*.18,eY-sz*.25); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eR-sz*.18,eY-sz*.25); ctx.lineTo(eR+sz*.2,eY-sz*.34); ctx.stroke();
  } else if(mood==='happy'){
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(eL,eY,sz*.13,0,PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eR,eY,sz*.13,0,PI*2); ctx.fill();
    ctx.strokeStyle='#422'; ctx.lineWidth=sz*.09; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(x,mY-sz*.07,sz*.3,.15,PI-.15); ctx.stroke();
    ctx.strokeStyle='#2e1a08'; ctx.lineWidth=sz*.08;
    ctx.beginPath(); ctx.moveTo(eL-sz*.2,eY-sz*.38); ctx.lineTo(eL+sz*.2,eY-sz*.44); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eR-sz*.2,eY-sz*.44); ctx.lineTo(eR+sz*.2,eY-sz*.38); ctx.stroke();
  } else if(mood==='thinking'){
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(eL,eY,sz*.11,0,PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eR,eY,sz*.14,0,PI*2); ctx.fill();
    ctx.strokeStyle='#422'; ctx.lineWidth=sz*.08; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(x+sz*.12,mY,sz*.22,.1,PI-.5); ctx.stroke();
    ctx.strokeStyle='#2e1a08'; ctx.lineWidth=sz*.08;
    ctx.beginPath(); ctx.moveTo(eL-sz*.2,eY-sz*.32); ctx.lineTo(eL+sz*.2,eY-sz*.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eR-sz*.2,eY-sz*.43); ctx.lineTo(eR+sz*.2,eY-sz*.33); ctx.stroke();
  } else if(mood==='determined'){
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(eL,eY+sz*.02,sz*.13,0,PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eR,eY+sz*.02,sz*.13,0,PI*2); ctx.fill();
    ctx.strokeStyle='#422'; ctx.lineWidth=sz*.09; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x-sz*.28,mY); ctx.lineTo(x+sz*.28,mY); ctx.stroke();
    ctx.strokeStyle='#2e1a08'; ctx.lineWidth=sz*.1;
    ctx.beginPath(); ctx.moveTo(eL-sz*.2,eY-sz*.29); ctx.lineTo(eL+sz*.2,eY-sz*.33); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eR-sz*.2,eY-sz*.33); ctx.lineTo(eR+sz*.2,eY-sz*.29); ctx.stroke();
  } else { // neutral
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(eL,eY,sz*.13,0,PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eR,eY,sz*.13,0,PI*2); ctx.fill();
    ctx.strokeStyle='#422'; ctx.lineWidth=sz*.07; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x-sz*.27,mY); ctx.lineTo(x+sz*.27,mY); ctx.stroke();
    ctx.strokeStyle='#2e1a08'; ctx.lineWidth=sz*.08;
    ctx.beginPath(); ctx.moveTo(eL-sz*.2,eY-sz*.32); ctx.lineTo(eL+sz*.2,eY-sz*.32); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eR-sz*.2,eY-sz*.32); ctx.lineTo(eR+sz*.2,eY-sz*.32); ctx.stroke();
  }
  ctx.restore();
}

// ── BACKGROUNDS ──────────────────────────────────────────────
// Pre-gen city skyline (deterministic)
const CITY = [0,1,2,3,4,5].map(i=>({
  bx:i*42+8, bw:24+i*5,
  bh:70+[20,55,15,80,40,65][i],
  lit:[...Array(32)].map((_,j)=>(j*13+i*7)%5<2),
}));

function bgOffice(a){
  if(a<=0)return; ctx.save(); ctx.globalAlpha=clamp(a);
  // wall
  let g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1c0f07'); g.addColorStop(.72,'#2a1208'); g.addColorStop(1,'#100804');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // wood grain lines
  ctx.strokeStyle='#190c04'; ctx.lineWidth=1;
  for(let y=60;y<H*.72;y+=55){
    ctx.globalAlpha=a*.3; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  ctx.globalAlpha=clamp(a);
  // floor
  g=ctx.createLinearGradient(0,H*.72,0,H);
  g.addColorStop(0,'#3c2010'); g.addColorStop(1,'#1e0e06');
  ctx.fillStyle=g; ctx.fillRect(0,H*.72,W,H*.28);
  // window right
  const wx=780,wy=75,ww=260,wh=360;
  ctx.fillStyle='#09152a'; ctx.fillRect(wx,wy,ww,wh);
  // city silhouette
  CITY.forEach(({bx,bw,bh,lit})=>{
    const rx=wx+bx, ry=wy+wh-bh;
    ctx.fillStyle='#040e1e'; ctx.fillRect(rx,ry,bw,bh);
    lit.forEach((on,j)=>{
      if(!on)return;
      const wx2=rx+3+(j%4)*6, wy2=ry+5+Math.floor(j/4)*14;
      if(wx2+5<rx+bw && wy2+8<ry+bh){ ctx.fillStyle='#1a3a60'; ctx.fillRect(wx2,wy2,5,7); }
    });
  });
  // window frame
  ctx.strokeStyle=C.midW; ctx.lineWidth=9; ctx.strokeRect(wx,wy,ww,wh);
  ctx.beginPath(); ctx.moveTo(wx+ww/2,wy); ctx.lineTo(wx+ww/2,wy+wh); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(wx,wy+wh/2); ctx.lineTo(wx+ww,wy+wh/2); ctx.stroke();
  // bookshelf left
  ctx.fillStyle=C.darkW; ctx.fillRect(28,55,175,500);
  const bkCols=['#8b2020','#204080','#206040','#7a5010','#502080','#1a4060'];
  for(let s=0;s<6;s++){
    ctx.fillStyle=C.midW; ctx.fillRect(28,55+s*82,175,8);
    for(let b=0;b<5;b++){
      ctx.fillStyle=bkCols[(s+b)%bkCols.length];
      ctx.fillRect(38+b*32,63+s*82,27,72);
    }
  }
  // desk surface
  const dt=H*.56, dW=560, dX=W/2-280;
  ctx.fillStyle=C.midW; ctx.fillRect(dX,dt,dW,22);
  ctx.fillStyle=C.darkW; ctx.fillRect(dX,dt+22,dW,200);
  ctx.fillStyle='#190c04'; ctx.fillRect(dX+18,dt+22,22,200); ctx.fillRect(dX+dW-40,dt+22,22,200);
  // lamp
  ctx.fillStyle='#888'; ctx.fillRect(W/2+195,dt-65,7,67);
  ctx.fillStyle='#c8b420';
  ctx.beginPath(); ctx.ellipse(W/2+198,dt-65,28,9,-.5,0,PI*2); ctx.fill();
  g=ctx.createRadialGradient(W/2+198,dt-30,0,W/2+198,dt-30,170);
  g.addColorStop(0,'rgba(255,220,90,.13)'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.restore();
}

function bgModern(a){
  if(a<=0)return; ctx.save(); ctx.globalAlpha=clamp(a);
  let g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#e8eef5'); g.addColorStop(.7,'#d0d9ea'); g.addColorStop(1,'#b8c5d8');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  g=ctx.createLinearGradient(0,H*.72,0,H);
  g.addColorStop(0,'#a8b6c8'); g.addColorStop(1,'#8898b2');
  ctx.fillStyle=g; ctx.fillRect(0,H*.72,W,H*.28);
  // floor grid
  ctx.strokeStyle='#95a5b8'; ctx.lineWidth=.5;
  for(let gx=0;gx<W;gx+=80){ ctx.globalAlpha=a*.3; ctx.beginPath(); ctx.moveTo(gx,H*.72); ctx.lineTo(gx,H); ctx.stroke(); }
  ctx.globalAlpha=clamp(a);
  // big window left
  g=ctx.createLinearGradient(0,55,0,H*.72); g.addColorStop(0,'#c5dff8'); g.addColorStop(1,'#a8cce8');
  ctx.fillStyle=g; ctx.fillRect(0,55,290,H*.7);
  ctx.strokeStyle='#a0b8d0'; ctx.lineWidth=5;
  ctx.strokeRect(0,55,290,H*.7);
  for(let wy=55;wy<H*.7+55;wy+=105){ ctx.beginPath(); ctx.moveTo(0,wy); ctx.lineTo(290,wy); ctx.stroke(); }
  ctx.beginPath(); ctx.moveTo(145,55); ctx.lineTo(145,H*.7+55); ctx.stroke();
  // desk
  const dt=H*.56, dX=W/2-290;
  ctx.fillStyle='#f7f8fc'; ctx.fillRect(dX,dt,580,20);
  ctx.fillStyle='#e0e5ee'; ctx.fillRect(dX,dt+20,580,165);
  ctx.fillStyle='#c8cdd8'; ctx.fillRect(dX+18,dt+20,15,165); ctx.fillRect(dX+580-33,dt+20,15,165);
  ctx.restore();
}

function bgAbstract(a){
  if(a<=0)return; ctx.save(); ctx.globalAlpha=clamp(a);
  let g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#020510'); g.addColorStop(.5,'#04071a'); g.addColorStop(1,'#020510');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=C.blue+'18'; ctx.lineWidth=1;
  const vx=W/2,vy=H*.5;
  for(let i=-8;i<=8;i++){
    ctx.beginPath(); ctx.moveTo(vx+i*80,0); ctx.lineTo(vx,vy); ctx.stroke();
  }
  for(let i=-6;i<=6;i++){
    const y=vy+i*55;
    if(y>=0&&y<=H){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  }
  ctx.restore();
}

function bgColumns(a){
  if(a<=0)return; ctx.save(); ctx.globalAlpha=clamp(a);
  let g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#f5f0e8'); g.addColorStop(.7,'#e8e0cf'); g.addColorStop(1,'#d0c8b5');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#c8c0ae'; ctx.fillRect(0,H*.75,W,H*.25);
  ctx.strokeStyle='#b8b0a0'; ctx.lineWidth=.8;
  for(let gx=0;gx<W;gx+=75){ ctx.beginPath(); ctx.moveTo(gx,H*.75); ctx.lineTo(gx,H); ctx.stroke(); }
  [[W*.18,C.gold],[W*.5,C.blue],[W*.82,C.green]].forEach(([cx,col])=>{
    const cw=68,ch=H*.68,cy=H*.05;
    ctx.fillStyle='#d5cdc0'; ctx.fillRect(cx-cw/2-14,cy-14,cw+28,14);
    g=ctx.createLinearGradient(cx-cw/2,0,cx+cw/2,0);
    g.addColorStop(0,'#c5bdb0'); g.addColorStop(.3,'#f0e8d8'); g.addColorStop(.7,'#e0d8c5'); g.addColorStop(1,'#b5ada0');
    ctx.fillStyle=g; ctx.fillRect(cx-cw/2,cy,cw,ch);
    ctx.fillStyle=col+'1a'; ctx.fillRect(cx-cw/2,cy,cw,ch);
    ctx.fillStyle='#d0c8b5'; ctx.fillRect(cx-cw/2-14,cy+ch,cw+28,18);
  });
  ctx.restore();
}

let ttsIdx=-1, subtitle='', subAt=-99, bestVoice=null;

function initVoices(){
  if(!window.speechSynthesis)return;
  function pick(){
    const vs=speechSynthesis.getVoices(); if(!vs.length)return;
    const prefs=['Daniel','Alex','Google UK English Male','David','Google US English'];
    for(const p of prefs){ const v=vs.find(v=>v.name.includes(p)); if(v){bestVoice=v;return;} }
    bestVoice=vs.find(v=>v.lang.startsWith('en'))||vs[0];
  }
  speechSynthesis.onvoiceschanged=pick; pick();
}
function speak(t){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.rate=.88; u.pitch=1; u.volume=1;
  if(bestVoice)u.voice=bestVoice;
  speechSynthesis.speak(u);
}
function tickTTS(){
  for(let i=ttsIdx+1;i<SCRIPT.length;i++){
    if(T>=SCRIPT[i][0]){ speak(SCRIPT[i][1]); subtitle=SCRIPT[i][1]; subAt=T; ttsIdx=i; }
  }
}
function drawSubs(){
  if(!subtitle)return;
  const age=T-subAt;
  const nextT=ttsIdx+1<SCRIPT.length?SCRIPT[ttsIdx+1][0]:92;
  const dur=Math.min(nextT-subAt,6.5);
  const a=clamp(age<.4?age/.4:age>dur-.4?(dur-age)/.4:1);
  if(a<=0)return;
  const sy=H-48;
  ctx.save(); ctx.font='21px Georgia,serif'; ctx.textAlign='center';
  const tw=ctx.measureText(subtitle).width;
  const pw=Math.min(tw+50,W*.85);
  ctx.globalAlpha=a*.8; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.roundRect(W/2-pw/2,sy-20,pw,40,8); ctx.fill();
  ctx.globalAlpha=a; ctx.fillStyle='#fff'; ctx.textBaseline='middle';
  ctx.fillText(subtitle,W/2,sy); ctx.restore();
}

  if(T>13.5&&T<28.5)     scene2(scA(13.5,28.5,.8,.8));
  if(T>27.2&&T<41.5)     scene3(scA(27.2,41.5,.8,.8));
  if(T>40.2&&T<55.5)     scene4(scA(40.2,55.5,.8,.8));
  if(T>54.2&&T<69.5)     scene5(scA(54.2,69.5,.8,.8));
  if(T>68.2&&T<83.5)     scene6(scA(68.2,83.5,.8,.8));
  if(T>82)               scene7(scA(82,91,.8,2));
  drawSubs();
  drawProgress();
  if(T<90)requestAnimationFrame(draw);
}

// ── STARTUP ──────────────────────────────────────────────────
initVoices();
const overlay=document.getElementById('overlay');
overlay.addEventListener('click',()=>{
  overlay.style.display='none';
  running=true;
  if(window.speechSynthesis){ const u=new SpeechSynthesisUtterance(' '); u.volume=0; speechSynthesis.speak(u); }
  requestAnimationFrame(draw);
});
// Static preview frame
ctx.fillStyle=C.bg; ctx.fillRect(0,0,W,H); T=1; scene1(1); drawProgress();
</script>
